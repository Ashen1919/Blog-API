spring.application.name=Blog_API
server.port=${PORT:8080}

# Database configuration
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Cloudinary configuration
spring.cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
spring.cloudinary.api-key=${CLOUDINARY_API_KEY}
spring.cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# File upload configuration
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# JWT configuration
spring.jwt.secret=${JWT_SECRET}
spring.jwt.access-token-expiration=${JWT_ACCESS_TOKEN_EXPIRATION}
spring.jwt.refresh-token-expiration=${JWT_REFRESH_TOKEN_EXPIRATION}

# Redis configuration
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.ssl.enabled=false
spring.data.redis.timeout=${REDIS_TIMEOUT}
spring.data.redis.lettuce.pool.max-active=${REDIS_MAX_ACTIVE}
spring.data.redis.lettuce.pool.max-idle=${REDIS_MAX_IDLE}
spring.data.redis.lettuce.pool.min-idle=${REDIS_MIN_IDLE}
spring.data.redis.lettuce.pool.max-wait=${REDIS_MAX_WAIT}

# health check configuration
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always